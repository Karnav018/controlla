services:
  redis:
    image: redis:7-alpine
    # Host ports remapped (6381/27018) — 6379/27017 are taken by other local projects.
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Browsable MongoDB UI for dev — http://localhost:8082 (login: admin / Controlla@2026!!)
  mongo-express:
    image: mongo-express:1
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: "Controlla@2026!!"
    depends_on:
      - mongo

volumes:
  redis-data:
  mongo-data:
