<svg width="960" height="300" viewBox="0 0 960 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0f1e"/>
      <stop offset="1" stop-color="#151c36"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="960" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="reflect">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-960 0; 960 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#3b4a6b" stroke-width="1" opacity="0.14"/>
    </pattern>
    <clipPath id="type">
      <rect x="258" y="160" height="30" width="0">
        <animate attributeName="width" values="0;448;448" keyTimes="0;0.45;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="960" height="300" rx="16" fill="url(#bg)"/>
  <rect width="960" height="300" rx="16" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="959" height="299" rx="15.5" fill="none" stroke="#2a3452"/>

  <!-- drifting particles -->
  <g fill="#a78bfa">
    <circle cx="240" cy="70" r="2.5"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="52" r="2" fill="#22d3ee"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="262" r="2.5" fill="#f472b6"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="368" cy="248" r="2"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="912" cy="246" r="2" fill="#34d399"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="66" cy="250" r="2" fill="#22d3ee"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- gamepad -->
  <g transform="translate(120,150)">
    <animateTransform attributeName="transform" type="translate" values="120 150;120 143;120 150" dur="4s" repeatCount="indefinite"/>
    <rect x="-58" y="-32" width="116" height="64" rx="32" fill="#1c2440" stroke="#384566" stroke-width="2"/>
    <rect x="-40" y="-5" width="28" height="10" rx="2" fill="#8fa0bf"/>
    <rect x="-31" y="-14" width="10" height="28" rx="2" fill="#8fa0bf"/>
    <circle cx="26" cy="-9" r="7" fill="#f472b6"><animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="6" r="7" fill="#22d3ee"><animate attributeName="opacity" values="1;0.25;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- phone with QR + radar ping -->
  <g transform="translate(838,150)">
    <animateTransform attributeName="transform" type="translate" values="838 150;838 144;838 150" dur="3.4s" begin="-1.2s" repeatCount="indefinite"/>
    <circle r="52" fill="none" stroke="#22d3ee" stroke-width="2">
      <animate attributeName="r" values="50;72" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-28" y="-50" width="56" height="100" rx="11" fill="#1c2440" stroke="#384566" stroke-width="2"/>
    <rect x="-21" y="-39" width="42" height="74" rx="4" fill="#0b0f1e"/>
    <g fill="#dbe4f3">
      <animate attributeName="opacity" values="1;0.35;1" dur="2.5s" repeatCount="indefinite"/>
      <rect x="-14" y="-25" width="9" height="9"/><rect x="5" y="-25" width="9" height="9"/>
      <rect x="-14" y="-6" width="9" height="9"/><rect x="7" y="-4" width="5" height="5"/>
      <rect x="-3" y="-14" width="5" height="5"/><rect x="-14" y="9" width="9" height="9"/>
      <rect x="3" y="9" width="5" height="5"/><rect x="9" y="15" width="4" height="4"/>
    </g>
  </g>

  <!-- eyebrow -->
  <text x="480" y="66" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" letter-spacing="5" fill="#64748b">
    PRESS START
    <animate attributeName="opacity" values="1;1;0.15;0.15" keyTimes="0;0.55;0.6;1" dur="1.5s" repeatCount="indefinite"/>
  </text>

  <!-- wordmark -->
  <text x="480" y="132" text-anchor="middle" font-size="58" font-weight="800" letter-spacing="7" fill="url(#shimmer)">CONTROLLA</text>

  <!-- typed tagline -->
  <g font-family="ui-monospace, monospace" font-size="19" fill="#c7d2e8">
    <text x="262" y="182" clip-path="url(#type)">The operating system for party games_</text>
    <rect y="166" width="10" height="21" fill="#22d3ee">
      <animate attributeName="x" values="262;700;700" keyTimes="0;0.45;1" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- chips -->
  <g font-family="ui-monospace, monospace" font-size="12" letter-spacing="1">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.2s" fill="freeze"/>
      <rect x="182" y="222" width="230" height="30" rx="15" fill="#16213c" stroke="#22d3ee" stroke-opacity="0.55"/>
      <text x="297" y="241" text-anchor="middle" fill="#7dd3fc">PHONES BECOME CONTROLLERS</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.8s" fill="freeze"/>
      <rect x="428" y="222" width="170" height="30" rx="15" fill="#16213c" stroke="#a78bfa" stroke-opacity="0.55"/>
      <text x="513" y="241" text-anchor="middle" fill="#c4b5fd">GAMES ARE PLUGINS</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.4s" fill="freeze"/>
      <rect x="614" y="222" width="164" height="30" rx="15" fill="#16213c" stroke="#f472b6" stroke-opacity="0.55"/>
      <text x="696" y="241" text-anchor="middle" fill="#f9a8d4">SHIPS ZERO GAMES</text>
    </g>
  </g>
</svg>
