name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand(\"ping\").ok'" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          # ≥23 required: the plugin loader dynamically imports .ts test
          # fixtures via Node's native type stripping.
          node-version: 24
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm check:emitter
      - run: pnpm test:unit
      - run: pnpm test:integration
        env:
          TEST_REDIS_URL: redis://localhost:6379/15
          TEST_MONGO_URL: mongodb://localhost:27017/controlla_ci
