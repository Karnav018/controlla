<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skribix — TV</title>
<style>
  /* Scribble's OWN look — this page ships inside the game package.
     The platform only embeds it and streams state via postMessage. */
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: ui-rounded, 'SF Pro Rounded', 'Nunito', system-ui, sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(147, 51, 234, .08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(37, 99, 235, .08), transparent 40%),
      #f6f1e7;
    color: #2a2438;
    display: flex; flex-direction: column; padding: 22px 26px; gap: 14px;
  }
  .top { display: flex; align-items: center; justify-content: center; gap: 20px; }
  .pill { font-size: 13px; font-weight: 800; letter-spacing: .12em; color: #8b8399;
          background: #fff; border: 2px solid #e6ddcc; border-radius: 999px; padding: 6px 14px; }
  #hint { font-size: 34px; font-weight: 900; letter-spacing: .32em; color: #2a2438; text-transform: uppercase; }
  #hint.reveal { color: #16a34a; }
  #timer { font-size: 18px; font-weight: 900; min-width: 64px; text-align: center; color: #6d6480;
           background: #fff; border: 2px solid #e6ddcc; border-radius: 999px; padding: 7px 12px; }
  #timer.low { color: #e11d48; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .main { flex: 1; min-height: 0; display: flex; gap: 20px; justify-content: center; }
  .boardWrap { position: relative; height: 100%; aspect-ratio: 1; }
  #board { position: absolute; inset: 0; width: 100%; height: 100%; background: #fff;
           border-radius: 20px; border: 3px solid #2a2438; box-shadow: 8px 8px 0 rgba(42, 36, 56, .12); }
  #overlay {
    position: fixed; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(10, 12, 18, 0.75);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 999; padding: 20px;
  }
  #overlay.show { display: flex; }
  .modalCard {
    background: #ffffff; border: 3px solid #2b2836; border-radius: 28px;
    padding: 36px 44px; display: flex; flex-direction: column; align-items: center; gap: 14px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5); max-width: 500px; width: 100%; text-align: center;
    animation: popIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .ovAvatar {
    width: 96px; height: 96px; border-radius: 50%; border: 4px solid #2b2836;
    display: flex; align-items: center; justify-content: center; color: #ffffff;
    font-size: 42px; font-weight: 900; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .ovBadge {
    background: #f59e0b; border: 2px solid #2b2836; color: #000000;
    font-size: 11px; font-weight: 900; letter-spacing: 0.1em; padding: 3px 14px;
    border-radius: 999px; text-transform: uppercase;
  }
  @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .modalTitle { font-size: 26px; font-weight: 800; color: #2b2836; line-height: 1.25; }
  .modalTime {
    background: #fef08a; border: 2px solid #2b2836; border-radius: 999px;
    padding: 6px 20px; font-size: 14px; font-weight: 800; color: #2b2836;
  }
  .rail { width: 280px; display: flex; flex-direction: column; gap: 10px; background: #fff;
          border: 3px solid #2a2438; border-radius: 20px; padding: 16px; box-shadow: 8px 8px 0 rgba(42,36,56,.12); }
  .player { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 15px; }
  .av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        color: #fff; font-weight: 900; flex: none; border: 2.5px solid #2a2438; }
  .player .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .player .pt { color: #9333ea; font-variant-numeric: tabular-nums; }
  .badge { font-size: 12px; }
  #feed { margin-top: auto; border-top: 2px dashed #e6ddcc; padding-top: 10px; display: flex;
          flex-direction: column; gap: 5px; max-height: 150px; overflow: hidden; }
  #feed div { font-size: 12.5px; font-weight: 700; color: #8b8399; white-space: nowrap;
              overflow: hidden; text-overflow: ellipsis; }
  #feed div.correct { color: #16a34a; }
  #feed div.reveal { color: #e11d48; }
</style>
</head>
<body>
  <!-- Fullscreen Blur Overlay -->
  <div id="overlay">
    <div class="modalCard">
      <div id="ovAv" class="ovAvatar">P</div>
      <div id="ovBadge" class="ovBadge">PICASSO</div>
      <div id="ovTitle" class="modalTitle">Picasso is choosing a word...</div>
      <div id="ovTime" class="modalTime">Please wait!</div>
    </div>
  </div>

  <div class="top">
    <span class="pill" id="round">ROUND –</span>
    <span id="hint">· · ·</span>
    <span id="timer">–</span>
  </div>
  <div class="main">
    <div class="boardWrap">
      <canvas id="board"></canvas>
    </div>
    <div class="rail"><div id="players"></div><div id="feed"></div></div>
  </div>

<script>
  const AV_COLORS = ['#f43f6b','#f59e0b','#22d3ee','#a855f7','#84cc16','#38bdf8','#fb7185','#34d399'];
  const colorFor = (id) => { let h = 0; for (const ch of id) h = (h * 31 + ch.charCodeAt(0)) >>> 0; return AV_COLORS[h % AV_COLORS.length]; };
  let state = null;

  function drawBoard() {
    const canvas = document.getElementById('board');
    const wrap = canvas.parentElement;
    const px = wrap.clientHeight * (window.devicePixelRatio || 1);
    canvas.width = px; canvas.height = px;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, px, px);
    if (!state) return;
    const scale = px / 1000;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (const s of state.strokes || []) {
      ctx.strokeStyle = (state.colors || [])[s.c] || '#111318';
      ctx.lineWidth = Math.max(1, s.w * scale);
      ctx.beginPath();
      s.p.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x * scale, y * scale) : ctx.lineTo(x * scale, y * scale));
      if (s.p.length === 1) ctx.lineTo(s.p[0][0] * scale + .1, s.p[0][1] * scale);
      ctx.stroke();
    }
  }

  function render() {
    if (!state) return;
    document.getElementById('round').textContent = 'ROUND ' + Math.max(1, state.round) + '/' + state.totalRounds;
    const hint = document.getElementById('hint');
    hint.textContent = state.phase === 'choosing' ? '· · ·' : (state.hint || '');
    hint.className = state.phase === 'reveal' ? 'reveal' : '';

    const overlay = document.getElementById('overlay');
    if (state.phase === 'choosing' && state.drawer) {
      overlay.className = 'show';
      const drawerName = state.drawer.name || 'Picasso';
      const drawerInitial = (drawerName[0] || 'P').toUpperCase();
      const drawerColor = colorFor(state.drawer.id || 'drawer');

      document.getElementById('ovAv').textContent = drawerInitial;
      document.getElementById('ovAv').style.background = drawerColor;
      document.getElementById('ovBadge').textContent = drawerName + ' • PICASSO';
      document.getElementById('ovTitle').textContent = drawerName + ' is choosing the word...';
      document.getElementById('ovTime').textContent = 'Please wait!';
    } else if (state.phase === 'reveal') {
      overlay.className = 'show';
      document.getElementById('ovAv').textContent = '💡';
      document.getElementById('ovAv').style.background = '#f59e0b';
      document.getElementById('ovBadge').textContent = 'REVEAL';
      document.getElementById('ovTitle').textContent = 'THE WORD WAS!';
      document.getElementById('ovTime').textContent = (state.hint || '').toUpperCase();
    } else overlay.className = '';

    const ranked = [...(state.players || [])].sort((a, b) => (state.points[b.id] || 0) - (state.points[a.id] || 0));
    document.getElementById('players').innerHTML = ranked.map((p) => {
      const isDrawer = state.drawer && state.drawer.id === p.id;
      const guessed = (state.guessed || []).includes(p.id);
      return '<div class="player"><span class="av" style="background:' + colorFor(p.id) + '">' +
        (p.name[0] || '?').toUpperCase() + '</span><span class="nm">' + p.name +
        (isDrawer ? ' <span class="badge">✏️</span>' : '') + (guessed ? ' <span class="badge">✅</span>' : '') +
        '</span><span class="pt">' + (state.points[p.id] || 0) + '</span></div>';
    }).join('');

    document.getElementById('feed').innerHTML = (state.feed || []).slice(-5)
      .map((f) => '<div class="' + f.kind + '">' + f.text.replace(/</g, '&lt;') + '</div>').join('');
    drawBoard();
  }

  setInterval(() => {
    const el = document.getElementById('timer');
    if (state && state.endsAt && state.phase === 'drawing') {
      const s = Math.max(0, Math.ceil((state.endsAt - Date.now()) / 1000));
      el.textContent = s + 's';
      el.className = s <= 10 ? 'low' : '';
    } else { el.textContent = '–'; el.className = ''; }
  }, 400);

  window.addEventListener('resize', drawBoard);
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'controlla:state') { state = e.data.state; render(); }
  });
</script>
</body>
</html>
